spring.application.name=atletry

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}
server.servlet.context-path=/api/v1

atletry.jwt.secret=${JWT_SECRET}
atletry.jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY_MS:86400000}
atletry.jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY_MS:604800000}

atletry.otp.length=6
atletry.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:5}

atletry.aws.region=${AWS_REGION:ap-south-1}
atletry.aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
atletry.aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}

atletry.sms.provider=${SMS_PROVIDER:mock}
atletry.sms.twilio.message-template=Your Atletry OTP is {otp}. Valid for a few minutes. Do not share it.

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

atletry.super-admin.mobile=${SUPER_ADMIN_MOBILE:7095793613}

atletry.firebase.enabled=${FIREBASE_ENABLED:false}
atletry.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:/app/firebase-service-account.json}
spring.jackson.serialization.write-dates-as-timestamps=false