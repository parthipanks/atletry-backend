spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

atletry.otp.mock-enabled=false

atletry.aws.s3.bucket=${AWS_S3_BUCKET}

atletry.sms.provider=${SMS_PROVIDER}
atletry.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
atletry.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
atletry.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}

logging.level.com.atletry=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
