  - changeSet:
      id: 010-01-create-academy-branches
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: academy_branches
      changes:
        - createTable:
            tableName: academy_branches
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: academy_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: VARCHAR(255)
              - column:
                  name: area
                  type: VARCHAR(100)
              - column:
                  name: city
                  type: VARCHAR(100)
              - column:
                  name: pincode
                  type: VARCHAR(6)
              - column:
                  name: latitude
                  type: DOUBLE PRECISION
              - column:
                  name: longitude
                  type: DOUBLE PRECISION
              - column:
                  name: is_residential
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: is_primary
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: linked_venue_id
                  type: BIGINT
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
        - addForeignKeyConstraint:
            baseTableName: academy_branches
            baseColumnNames: academy_id
            referencedTableName: academies
            referencedColumnNames: id
            constraintName: fk_academy_branches_academy
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: academy_branches
            baseColumnNames: linked_venue_id
            referencedTableName: grounds
            referencedColumnNames: id
            constraintName: fk_academy_branches_ground
            onDelete: SET NULL

