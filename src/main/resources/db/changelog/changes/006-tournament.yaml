  - changeSet:
      id: 006-03-create-tournament-registrations
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: tournament_registrations
      changes:
        - createTable:
            tableName: tournament_registrations
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tournament_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: team_name
                  type: VARCHAR(100)
              - column:
                  name: created_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_date
                  type: TIMESTAMP WITH TIME ZONE
        - addUniqueConstraint:
            tableName: tournament_registrations
            columnNames: tournament_id, user_id
            constraintName: uq_tournament_registrations_tournament_user
        - addForeignKeyConstraint:
            baseTableName: tournament_registrations
            baseColumnNames: tournament_id
            referencedTableName: tournaments
            referencedColumnNames: id
            constraintName: fk_tournament_registrations_tournament
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: tournament_registrations
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tournament_registrations_user
            onDelete: CASCADE
