  - changeSet:
      id: 006-02-create-tournament-images
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: tournament_images
      changes:
        - createTable:
            tableName: tournament_images
            columns:
              - column:
                  name: tournament_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: VARCHAR(500)
              - column:
                  name: sort_order
                  type: INTEGER
        - addForeignKeyConstraint:
            baseTableName: tournament_images
            baseColumnNames: tournament_id
            referencedTableName: tournaments
            referencedColumnNames: id
            constraintName: fk_tournament_images_tournament
            onDelete: CASCADE

