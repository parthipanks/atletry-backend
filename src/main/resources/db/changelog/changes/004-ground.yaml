  - changeSet:
      id: 004-01-create-grounds
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: grounds
      changes:
        - createTable:
            tableName: grounds
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: venue_type
                  type: VARCHAR(40)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: pincode
                  type: VARCHAR(6)
              - column:
                  name: address_line1
                  type: VARCHAR(255)
              - column:
                  name: address_line2
                  type: VARCHAR(255)
              - column:
                  name: address
                  type: VARCHAR(255)
              - column:
                  name: latitude
                  type: DOUBLE PRECISION
              - column:
                  name: longitude
                  type: DOUBLE PRECISION
              - column:
                  name: year_opened
                  type: INTEGER
              - column:
                  name: custom_amenities
                  type: VARCHAR(200)
              - column:
                  name: sport_id
                  type: BIGINT
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: approval_status
                  type: VARCHAR(20)
                  defaultValue: PENDING_APPROVAL
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_date
                  type: TIMESTAMP WITH TIME ZONE
        - addForeignKeyConstraint:
            baseTableName: grounds
            baseColumnNames: sport_id
            referencedTableName: sports
            referencedColumnNames: id
            constraintName: fk_grounds_sport
            onDelete: SET NULL
        - addForeignKeyConstraint:
            baseTableName: grounds
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_grounds_created_by
            onDelete: RESTRICT

