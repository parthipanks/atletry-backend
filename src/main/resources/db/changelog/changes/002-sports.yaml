  - changeSet:
      id: 002-02-create-skill-levels
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: skill_levels
      changes:
        - createTable:
            tableName: skill_levels
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sport_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: level_code
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: label
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: created_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_date
                  type: TIMESTAMP WITH TIME ZONE
        - addUniqueConstraint:
            tableName: skill_levels
            columnNames: sport_id, level_code
            constraintName: uq_skill_levels_sport_level
        - addForeignKeyConstraint:
            baseTableName: skill_levels
            baseColumnNames: sport_id
            referencedTableName: sports
            referencedColumnNames: id
            constraintName: fk_skill_levels_sport
            onDelete: CASCADE
