  - changeSet:
      id: 001-02-create-users
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: mobile
                  type: VARCHAR(15)
                  constraints:
                    nullable: false
