  - changeSet:
      id: 009-02-create-academy-sports
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: academy_sports
      changes:
        - createTable:
            tableName: academy_sports
            columns:
              - column:
                  name: academy_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: sport_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: academy_sports
            columnNames: academy_id, sport_id
            constraintName: pk_academy_sports
        - addForeignKeyConstraint:
            baseTableName: academy_sports
            baseColumnNames: academy_id
            referencedTableName: academies
            referencedColumnNames: id
            constraintName: fk_academy_sports_academy
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: academy_sports
            baseColumnNames: sport_id
            referencedTableName: sports
            referencedColumnNames: id
            constraintName: fk_academy_sports_sport
            onDelete: CASCADE

