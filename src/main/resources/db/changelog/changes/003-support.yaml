  - changeSet:
      id: 003-02-create-user-notifications
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: user_notifications
      changes:
        - createTable:
            tableName: user_notifications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: is_read
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: sent_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_notifications
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_notifications_user
            onDelete: CASCADE
        - createIndex:
            tableName: user_notifications
            indexName: idx_user_notifications_user
            columns:
              - column:
                  name: user_id

