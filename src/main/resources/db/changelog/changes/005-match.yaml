  - changeSet:
      id: 005-01-create-matches
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: matches
      changes:
        - createTable:
            tableName: matches
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: host_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: sport_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: venue
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: max_players
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING_APPROVAL
                  constraints:
                    nullable: false
              - column:
                  name: score
                  type: VARCHAR(20)
              - column:
                  name: created_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_date
                  type: TIMESTAMP WITH TIME ZONE
        - addForeignKeyConstraint:
            baseTableName: matches
            baseColumnNames: host_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_matches_host
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: matches
            baseColumnNames: sport_id
            referencedTableName: sports
            referencedColumnNames: id
            constraintName: fk_matches_sport
            onDelete: RESTRICT

