  - changeSet:
      id: 005-03-create-match-participants
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: match_participants
      changes:
        - createTable:
            tableName: match_participants
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: match_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: CONFIRMED
                  constraints:
                    nullable: false
              - column:
                  name: is_winner
                  type: BOOLEAN
              - column:
                  name: rating
                  type: INTEGER
              - column:
                  name: rated_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_date
                  type: TIMESTAMP WITH TIME ZONE
        - addUniqueConstraint:
            tableName: match_participants
            columnNames: match_id, user_id
            constraintName: uq_match_participants_match_user
        - addForeignKeyConstraint:
            baseTableName: match_participants
            baseColumnNames: match_id
            referencedTableName: matches
            referencedColumnNames: id
            constraintName: fk_match_participants_match
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: match_participants
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_match_participants_user
            onDelete: CASCADE
