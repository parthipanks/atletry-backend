  - changeSet:
      id: 005-02-create-match-images
      author: Chiranjeevi D
      preConditions:
        onFail: MARK_RAN
        not:
          - tableExists:
              tableName: match_images
      changes:
        - createTable:
            tableName: match_images
            columns:
              - column:
                  name: match_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: VARCHAR(500)
              - column:
                  name: sort_order
                  type: INTEGER
        - addForeignKeyConstraint:
            baseTableName: match_images
            baseColumnNames: match_id
            referencedTableName: matches
            referencedColumnNames: id
            constraintName: fk_match_images_match
            onDelete: CASCADE

