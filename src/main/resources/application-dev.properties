
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/atletry}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

atletry.jwt.secret=${JWT_SECRET:YWxlcnRyeS1zdXBlci1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=}

atletry.otp.mock-enabled=true
atletry.otp.mock-value=${OTP_MOCK_VALUE:123456}

atletry.aws.s3.bucket=${AWS_S3_BUCKET:atletry-dev}

atletry.sms.provider=mock

logging.level.com.atletry=DEBUG
logging.level.org.springframework.security=DEBUG

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

atletry.firebase.enabled=${FIREBASE_ENABLED:false}
atletry.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}
