# ── H2 in-memory profile ─────────────────────────────────────────────────────
# Activated with: mvn clean install -Dspring.profiles.active=mem
# or via Maven profile: mvn clean install -Pmem
# Uses H2 in PostgreSQL compatibility mode so Liquibase scripts run unchanged.

spring.datasource.url=jdbc:h2:mem:atletrydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Stub values so context loads without real external services
atletry.jwt.secret=dGVzdC1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHM=
atletry.aws.s3.bucket=mem-test-bucket
atletry.sms.provider=mock
atletry.otp.mock-enabled=true
atletry.otp.mock-value=123456
atletry.firebase.enabled=false
